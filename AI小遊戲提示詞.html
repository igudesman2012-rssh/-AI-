<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI小遊戲提示詞.html</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂隱藏捲軸但可滾動的樣式 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 避免點擊時的藍色高光 */
        button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- 頂部標題區 -->
    <header class="text-center py-12 px-4">
        <h1 class="text-3xl font-bold text-gray-600 mb-2">AI小遊戲製作用提示詞</h1>
        <p class="text-gray-400 text-sm">課程學員專屬，即刻提升您的 AI 應用力</p>
    </header>

    <!-- 提示詞列表區塊 -->
    <main class="max-w-4xl mx-auto px-4 pb-20 pt-4">
        <h2 class="text-xl font-bold text-gray-500 mb-4 border-b-2 border-indigo-200 pb-2">海洋教育公開課使用</h2>
        <div id="card-container" class="space-y-4">
            <!-- 卡片會由 JavaScript 動態生成在這裡 -->
        </div>
    </main>

    <!-- 互動彈出視窗 (Modal) -->
    <div id="prompt-modal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex justify-center items-center z-50 transition-opacity p-4">
        <div class="bg-white rounded-lg w-full max-w-2xl shadow-xl overflow-hidden relative flex flex-col max-h-full">
            <!-- Modal 標題 -->
            <div class="px-6 py-4 flex justify-between items-center border-b shrink-0">
                <div class="flex items-center space-x-3 pr-4">
                    <span id="modal-id" class="bg-gray-200 text-gray-600 px-2 py-0.5 rounded text-xs font-bold shrink-0">W-1</span>
                    <h3 id="modal-title" class="text-lg font-bold text-gray-800 line-clamp-1">不知道怎麼用它</h3>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold shrink-0 leading-none">&times;</button>
            </div>
            
            <!-- Modal 內容 (動態生成) -->
            <div class="px-6 py-4 overflow-y-auto no-scrollbar" id="modal-content-area">
                <!-- 提示詞內容與多重複製按鈕會由 JS 動態生成 -->
            </div>
            
            <!-- Modal 底部按鈕 (供單一提示詞使用) -->
            <div class="px-6 py-4 bg-white border-t shrink-0" id="modal-footer">
                <button onclick="copyPrompt()" id="copy-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg shadow transition-colors flex justify-center items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    複製提示詞
                </button>
            </div>
        </div>
    </div>

    <!-- 腳本邏輯 -->
    <script>
        // --- 1. 資料庫 (可隨時擴充與修改) ---
        const promptsData = [
            {
                id: "G-1",
                title: "議題小遊戲提示詞",
                preview: "包含白海豚逃離噪音、外木山珊瑚搶救、七股黑面琵鷺、花蓮海洋溫差等多個環境議題...",
                sub_prompts: [
                    {
                        subtitle: "老師示範：白海豚逃離離岸風電噪音",
                        content: "[角色與目標]\n你是一位精通 HTML5 與 Three.js 遊戲開發、且重視 UI/UX 設計與環境教育的前端工程師。請幫我寫一個單一 HTML 檔案的「白海豚逃離離岸風電噪音」3D 網頁遊戲。\n\n[技術與 UI 規範]\n\n單一檔案結構：將 HTML、CSS、JavaScript 全部寫在同一個檔案內，確保我能直接在瀏覽器點擊執行。\n穩定引入套件：請使用 <script type=\"importmap\"> 引入最新版 Three.js，確保核心模組穩定運作。\n擴充性架構（重要）：為避免程式碼過於龐大導致中斷，目前遊戲內所有物件先使用 Three.js 的「基礎幾何圖形（Geometry）」建立。但請在程式碼中預留區塊並寫上明確的中文註解，說明未來我該如何將這些圖形替換成 .gltf 外部 3D 模型檔案。\nUI 疊加層：遊戲的開始畫面、文字提示、以及遊戲結束的結算畫面，請使用簡潔的 CSS 樣式（如半透明黑色背景、白色粗體字）直接覆蓋在 3D Canvas 上方。\n\n[功能與邏輯細節]\n\n場景與基礎物件設定：\n環境：深藍色背景代表海洋，底部有一片平面的沙床。\n玩家（白海豚）：位於場景原點，以「白色長條膠囊體（CapsuleGeometry）」代表。\n障礙物（白化珊瑚礁）：以「白色圓錐體（ConeGeometry）」隨機散佈於海底。\n危險區（海底打樁機）：以「灰色巨大圓柱體」代表，周圍包裹一個「紅色半透明球體」作為噪音傷害的碰撞範圍。\n安全區（新家園）：在場景較遠處，放置一個「綠色半透明的方塊或發光球體」，代表乾淨、無噪音的海域。\n攝影機與操作：\n必須固定為「第三人稱視角」，攝影機設定在白海豚（玩家）的斜後方，並隨著玩家移動進行平滑跟隨。\n玩家使用鍵盤 W、A、S、D （或方向鍵）控制白海豚的前進、後退與左右轉向。\n勝負條件（碰撞偵測）：\n失敗（Game Over）：當白海豚觸碰到「紅色噪音範圍」時，停止遊戲進行。\n過關（You Win）：當白海豚成功觸碰並進入「綠色安全區」時，停止遊戲進行。\n\n[UX 防呆與回饋]\n\n狀態提示與結算：觸發勝負條件時，必須彈出明顯的 UI 畫面。失敗時顯示「噪音太大，白海豚無法生存！」；過關時顯示「成功逃離噪音，白海豚找到了新家園！」。\n重新開始機制：結算畫面需提供一個「重新開始」的按鈕，點擊後能自動重置玩家位置與狀態，不須讓使用者手動重新整理網頁。\n程式碼註解防呆：請務必加上詳細的「繁體中文註解」，解釋每一段邏輯（尤其是碰撞偵測、視角跟隨、移動邏輯、以及未來替換 3D 模型的位置），確保初學者能看懂並知道如何修改參數。請完整輸出程式碼，不要中斷或省略。"
                    },
                    {
                        subtitle: "議題一：北部 - 基隆協和電廠改建",
                        content: "[角色與目標]\n你是一位精通 HTML5 與 Three.js 遊戲開發的前端專家。請幫我開發一款名為「搶救外木山：珊瑚大撤退」的 3D 網頁遊戲。遊戲的主題是：在基隆北海岸，填海造陸的工程即將展開，玩家必須在水泥掩蓋海岸之前，盡可能蒐集並搶救海床上的大型扇形珊瑚礁。\n\n[技術與環境規範]\n單一檔案結構：將 HTML、CSS、JavaScript 全部寫在同一個檔案內，確保我能直接在瀏覽器點擊執行。\n穩定引入套件：請使用 <script type=\"importmap\"> 引入最新版 Three.js，確保核心模組穩定運作。\n擴充性架構（重要）：為避免程式碼過於龐大導致中斷，目前遊戲內所有物件先使用 Three.js的「基礎幾何圖形（Geometry）」建立。但請在程式碼中預留區塊並寫上明確的中文註解，說明未來我該如何將這些圖形替換成 .gltf 外部 3D 模型檔案。\nUI 疊加層：遊戲的開始畫面、文字提示、以及遊戲結束的結算畫面，請使用簡潔的 CSS 樣式（如半透明黑色背景、白色粗體字）直接覆蓋在 3D Canvas 上方。\n\n[視覺與場景設計]\n天空盒/背景：淺藍色漸層代表透光的淺海環境。\n地板/環境：崎嶇的淺棕色網格地形，代表原本天然的海床。\n玩家物件：黃色圓柱體（CylinderGeometry），代表進行搶救作業的小型潛水艇。\n敵對物件/障礙物：從上方不斷掉落的灰色巨大立方體（BoxGeometry），代表填海造陸的消波塊與水泥。\n目標物件/寶物：粉紅色與紫色的半球體（SphereGeometry），代表珍貴的天然珊瑚礁。\n\n[玩法與操作邏輯]\n攝影機視角：鳥瞰俯視視角（Top-down），讓玩家看清海床上的珊瑚與掉落物。\n控制方式：WASD 鍵控制潛水艇在海床平面上前後左右移動。\n核心機制：灰色水泥塊會隨機從上方掉落並固定在海床上，玩家必須閃避掉落的水泥塊，並在珊瑚被覆蓋前去觸碰收集它們。\n\n[遊戲 UI 與勝負觸發]\nUI 介面：請用 CSS 製作「開始遊戲」按鈕與「結算畫面」。畫面上方需顯示剩餘倒數計時（預設 60 秒）與目前拯救的珊瑚數量。\n失敗條件：玩家被掉落的水泥塊砸中，顯示「潛艇受損，外木山海岸逐漸消失...」。\n勝利條件：在 60 秒內成功拯救 20 株珊瑚，顯示「搶救成功！但填海爭議仍待我們持續關注！」。\n防呆機制：結算畫面需有「重新挑戰」按鈕，點擊後重置所有物件狀態與計時器。"
                    },
                    {
                        subtitle: "議題二：中部 - 彰濱「離岸風電」議題",
                        content: "[角色與目標]\n你是一位精通 HTML5 與 Three.js 遊戲開發的前端專家。請幫我開發一款名為「白海豚的生存迷宮」的 3D 網頁遊戲。遊戲的主題是：在彰化外海，台灣白海豚必須穿越充滿打樁噪音與漁網的離岸風電施工海域，尋找安靜的覓食地。\n[技術與環境規範]\n**單一檔案結構：**將 HTML、CSS、JavaScript 全部寫在同一個檔案內，確保我能直接在瀏覽器點擊執行。\n**穩定引入套件：**請使用 <script type=\"importmap\"> 引入最新版 Three.js，確保核心模組穩定運作。\n**擴充性架構（重要）：**為避免程式碼過於龐大導致中斷，目前遊戲內所有物件先使用 Three.js的「基礎幾何圖形（Geometry）」建立。但請在程式碼中預留區塊並寫上明確的中文註解，說明未來我該如何將這些圖形替換成 .gltf 外部 3D 模型檔案。\n**UI 疊加層：**遊戲的開始畫面、文字提示、以及遊戲結束的結算畫面，請使用簡潔的 CSS 樣式（如半透明黑色背景、白色粗體字）直接覆蓋在 3D Canvas 上方。\n[視覺與場景設計]\n**天空盒/背景：**深藍色的海洋背景，帶有一點混濁感。\n**地板/環境：**無盡的平面沙床。\n**玩家物件：**白色長條膠囊體（CapsuleGeometry），代表台灣白海豚。\n**敵對物件/障礙物：**灰色高聳圓柱體（代表風機基座），其周圍環繞著「紅色半透明且會閃爍的球體」，代表打樁產生的巨大噪音傷害區。\n**目標物件/寶物：**藍色小球體叢集，代表白海豚賴以維生的魚群。綠色光柱代表最終的安全棲地。\n[玩法與操作邏輯]\n**攝影機視角：**第三人稱跟隨視角，鏡頭保持在海豚後上方。\n**控制方式：**滑鼠左右移動控制轉向，按住滑鼠左鍵或 W 鍵持續前進。\n**核心機制：**玩家必須不斷前進，聽覺（若能加音效更好）與視覺上避開紅色噪音圈，沿途收集魚群補充體力，最終抵達綠色光柱區。\n[遊戲 UI 與防呆機制]\n**UI 介面：**請用 CSS 製作。畫面上方需顯示「生命值（聽力健康度）」與「飢餓度」。\n**失敗條件：**碰到紅色噪音圈會快速扣除生命值，生命值歸零則失敗，顯示「噪音過大，白海豚失去了方向感...」。飢餓度歸零亦失敗。\n**勝利條件：**成功抵達遠方的綠色安全區，顯示「逃出噪音迷宮！讓我們共同思考風電與生態的共存之道。」。\n防呆機制（嚴格要求）：\n**視覺防護：**確保紅色噪音圈有明確的視覺邊界，讓玩家有足夠的反應時間閃避。\n**建模與移動方向對齊（防倒游機制）：**未來若使用複合幾何圖形（Group）來建立角色，務必確保模型的「頭部/正前方（如吻突）」配置於 Z 軸負方向（-Z），「尾部/後方（如尾鰭）」配置於 Z 軸正方向（+Z）。確保移動向量（如 Vector3(0, 0, -1)）必須與此建模面向完全一致，絕對避免出現頭尾顛倒、導致角色在視覺上「倒著游」的邏輯錯誤。"
                    },
                    {
                        subtitle: "議題三：南部 - 台南七股「漁電共生」議題",
                        content: "[角色與生態教育目標]\n你是一位精通 HTML5 與 Three.js 遊戲開發的前端專家。請幫我開發一款名為「黑面琵鷺的無影濕地」的 3D 網頁遊戲。遊戲的主題是：在七股的魚塭上方，黑面琵鷺面臨大面積太陽能光電板的光害與遮蔽，必須在破碎的棲地中精準降落覓食。\n[技術與環境規範]\n\n單一檔案結構：將 HTML、CSS、JavaScript 全部寫在同一個檔案內，確保我能直接在瀏覽器點擊執行。\n穩定引入套件：請使用 <script type=\"importmap\"> 引入最新版 Three.js，確保核心模組穩定運作。\n擴充性與防雷架構（重要）：\n所有 3D 物件先使用 Three.js 的「基礎幾何圖形組合」建立，並預留替換 .gltf 外部模型的中文註解區塊。\n模型層級與旋轉防呆：建立玩家模型時，請務必使用 Wrapper（外層容器）包覆 ModelGroup（內部模型）。外層的 Wrapper 負責場景中的位移（Position）與整體轉向；內層的 ModelGroup 專門負責模型自身的俯仰（Pitch）與動畫。請確保模型預設頭部朝向 Z 軸正向，以避免旋轉 180 度後造成的尤拉角（Euler Angles）X 軸正負值顛倒，導致「仰躺入水」的錯誤姿態。\nUI 疊加層：遊戲開始、文字提示與結算畫面，請使用簡潔的 CSS 樣式（半透明黑色背景、白色粗體字）直接覆蓋在 3D Canvas 上方。\n[視覺與場景結構設計]\n\n天空與環境：橘紅色的夕陽漸層天空盒（Skybox），搭配一大片水藍色的平面代表魚塭。\n黑面琵鷺（玩家物件）：\n請捨棄單純的圓錐體，使用程式化建模（Procedural Modeling）組合：以流線型的擠出幾何體（ExtrudeGeometry）製作羽翼，長扁的圓柱體（CylinderGeometry）製作黑色的湯匙狀鳥喙。\n請將關節軸心（Pivot Point）設定在肩膀與身體連接處，確保動畫運作自然。\n魚電共生太陽能板（障礙物）：\n嚴格禁止單點隨機散佈方塊或只貼平面圖片。\n請使用較薄的長方形（BoxGeometry）並傾斜一定角度，底部加上圓柱體（CylinderGeometry）作為支撐架。\n必須以「整排整齊排列」的陣列方式生成，且兩排太陽能板之間必須保留明顯的「水面空隙（水道）」，供鳥類俯衝。\n魚蝦（目標物件）：隨機生成的銀色小圓柱體，只能生成在太陽能板之間的水道空隙中。\n[玩法、操作與物理邏輯]\n\n攝影機與控制：第三人稱或越肩視角跟隨。WASD 鍵控制水平飛行方向(W向前，S向後，A向左，D向右)，滑鼠滾輪控制盤旋高度（上滾攀升，下滾降低）。\n俯衝捕食機制（關鍵動作）：\n按下空白鍵執行「俯衝捕食」。\n俯衝時，模型必須呈現「頭部與黑色鳥喙垂直朝下」的精準點水姿態（請確認俯仰角運算正確，鳥喙先著水，雙腿保持向後收起，絕不可用腳抓魚或尾巴入水）。\n動態平滑：飛行與俯衝的姿態切換請使用 Lerp（線性插值）確保動作滑順，並加入振翅的數學函數動畫。\n[遊戲 UI 與勝負觸發]\n\n介面：畫面上方顯示「目前體力」與「捕食數量」。\n防呆提示：俯衝時要有明確的十字準星或落點陰影提示，協助玩家判斷 3D 空間深度。\n失敗條件：撞擊太陽能板超過 3 次，顯示「棲地過度破碎，黑面琵鷺無法找到足夠的食物過冬...」。\n勝利條件：成功在空隙中捕食 15 隻魚蝦，顯示「成功過冬！土地多重利用的同時，也別忘了留一口飯給候鳥。」"
                    },
                    {
                        subtitle: "議題四：東部 - 花蓮和平電廠──海洋溫差發電",
                        content: "深海冷泉探勘者\n[角色與目標]\n你是一位精通 HTML5 與 Three.js 遊戲開發的前端專家。請幫我開發一款名為「深海冷泉探勘者」的 3D 網頁遊戲。遊戲的主題是：在花蓮和平外海，玩家操作深海探測器，尋找適合建置海洋溫差發電管線的位置，同時必須面對未知的深海環境與洋流風險。\n[技術與環境規範]\n\n單一檔案結構：將 HTML、CSS、JavaScript 全部寫在同一個檔案內，確保我能直接在瀏覽器點擊執行。\n穩定引入套件：請使用 <script type=\"importmap\"> 引入最新版 Three.js，確保核心模組穩定運作。\n擴充性架構（重要）：為避免程式碼過於龐大導致中斷，目前遊戲內所有物件先使用 Three.js的「基礎幾何圖形（Geometry）」建立。但請在程式碼中預留區塊並寫上明確的中文註解，說明未來我該如何將這些圖形替換成 .gltf 外部 3D 模型檔案。\nUI 疊加層：遊戲的開始畫面、文字提示、以及遊戲結束的結算畫面，請使用簡潔的 CSS 樣式（如半透明黑色背景、白色粗體字）直接覆蓋在 3D Canvas 上方。\n[視覺與場景設計]\n\n天空盒/背景：深藍色（非純黑），但必須設定基礎環境光 (AmbientLight)，確保即使在沒有陽光的深海環境下，也能清晰地辨識出海底地形基本輪廓和潛水器的白色外觀。嚴禁畫面全黑。\n地板/環境：起伏極大的深褐色多邊形地形（海溝邊緣）。地形必須設定基礎環境光，使其在黑暗中也能呈現深褐色，不被黑暗同化。\n玩家物件：帶有聚光燈（SpotLight）的白色立方體，代表無人深海探測器 (ROV)。潛水器的材質應具有發光 (Emissive) 屬性，確保其原本的白色能清晰顯露，不被深海黑暗覆蓋。\n敵對物件/障礙物：半透明、不規則扭動的藍色圓柱體（代表強烈且危險的深海暗流）；橘色錐體（代表脆弱的深海未知生態系）。\n目標物件/寶物：發著微弱綠光的地板區塊，代表水溫符合發電標準且地質穩定的「安全佈建點」。\n[玩法與操作邏輯]\n\n攝影機視角：固定在探測器後方，但視線範圍僅限於探測器聚光燈照亮的地方（周圍充滿戰爭迷霧/黑暗）。\n控制方式：W或向上鍵、S向下鍵 控制前進後退，A或向左鍵、D或向右鍵 控制左右平移，滑鼠可以控制Shift 鍵可開啟短暫的地形掃描（具備照亮全螢幕 10秒功能）。\n核心機制：在視線極佳受限的深海中，玩家必須謹慎移動，避開暗流與脆弱生態圈，尋找適合鋪設管線的綠色節點。\n[遊戲 UI 與勝負觸發]\n\nUI 介面：請用 CSS 製作。畫面上方顯示「機體抗壓值」與「已探勘節點：0/3」。\n失敗條件：被暗流捲入或破壞深海生態圈，機體抗壓值歸零，顯示「深海環境充滿未知，開發計畫必須更加謹慎評估...」。\n勝利條件：成功找到 3 個安全佈建點，顯示「探勘完成！尋找基載綠能的同時，預警原則與部落溝通不可少。」。\n[防呆機制（嚴格要求）]\n\n畫面可見度防呆 (Visibility Safeguard): 確保遊戲開始後，畫面絕對不能出現全部黑屏的情況。\n在沒有開啟地形掃描和聚光燈的情況下，必須設定基礎的 AmbientLight (環境光) 或高亮度背景，使玩家能夠清晰地看見起伏的海底地形輪廓、地形的深褐色、以及潛水器的白色輪廓和本色。\n潛水器的白色立方體必須具有發光 (Emissive) 屬性或使用 MeshBasicMaterial，使其在黑暗中依然能獨立顯露其原本的白色，不被深色環境所同化或覆蓋。任何導致場景變為純黑的設定都是無效的。\n技能防呆：聲納掃描（Shift鍵）沒有冷卻時間，可持續使用，並在 UI 上顯示進度條。\n建模與移動方向對齊（防倒車機制）：未來若使用複合幾何圖形或替換成外部 ROV 探測器模型，務必確保機體的「正前方（如聚光燈發射源、主攝影鏡頭）」配置於 Z 軸負方向（-Z），「後方（如推進器）」配置於 Z 軸正方向（+Z）。確保 W、S 鍵的前進後退移動向量與此面向完全一致，絕對避免出現探測器「倒退走」或聚光燈往後照的邏輯錯誤。"
                    }

        // --- 2. 狀態管理 ---
        let currentPromptText = '';

        // 輔助函數：跳脫 HTML 特殊字元，避免 <script> 等標籤破壞網頁結構隱藏按鈕
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;")
                      .replace(/</g, "&lt;")
                      .replace(/>/g, "&gt;")
                      .replace(/"/g, "&quot;")
                      .replace(/'/g, "&#039;");
        }

        // --- 3. 畫面渲染邏輯 ---

            const container = document.getElementById('card-container');
            container.innerHTML = ''; // 清空容器

            // 因為只剩下 Gemini，直接使用全部資料

            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-lg border border-dashed border-gray-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />

            // 生成卡片 HTML
            filteredData.forEach(item => {
                const cardHTML = `
                    <div onclick="openModal('${item.id}')" class="bg-white border border-gray-100 rounded-lg p-5 shadow-sm hover:shadow-md hover:border-indigo-100 transition-all duration-200 cursor-pointer flex justify-between items-start group">
                        <div class="pr-4 flex-1">
                            <div class="flex items-center space-x-3 mb-2">
                                <span class="bg-gray-100 text-gray-500 px-2.5 py-1 rounded-md text-xs font-bold group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">${item.id}</span>

        // --- 4. 互動視窗 (Modal) 與複製功能 ---
        function openModal(id) {
            const data = promptsData.find(item => item.id === id);
            if (!data) return;

            document.getElementById('modal-id').innerText = data.id;
            document.getElementById('modal-title').innerText = data.title;
            
            const contentArea = document.getElementById('modal-content-area');
            const footerArea = document.getElementById('modal-footer');
            
            // 清空內容區
            contentArea.innerHTML = '';

            // 判斷是否為「多段落提示詞」
            if (data.sub_prompts && data.sub_prompts.length > 0) {
                // 隱藏底部總複製按鈕
                footerArea.classList.add('hidden');
                
                // 動態生成每一段的內容與獨立複製按鈕，樣式依照附圖對齊
                data.sub_prompts.forEach((sp, index) => {
                    contentArea.innerHTML += `

                            <button onclick="copySpecificPrompt('${data.id}', ${index}, this)" class="w-full bg-[#5cb85c] hover:bg-green-600 text-white font-bold py-3 rounded-lg shadow transition-colors flex justify-center items-center">

                                </svg>

                            </button>
                        </div>
                    `;
                });
            } else {
                // 一般單一提示詞
                footerArea.classList.remove('hidden');
                contentArea.innerHTML = `
                    <p class="text-sm text-gray-500 mb-2 font-medium">提示詞內容：</p>
                    <div class="bg-gray-50 p-4 rounded-md border text-gray-700 text-sm leading-relaxed whitespace-pre-wrap">${escapeHTML(data.full_prompt)}</div>
                `;
                currentPromptText = data.full_prompt;

                    </svg>
                    複製提示詞`;
                copyBtn.className = 'w-full bg-[#5cb85c] hover:bg-green-600 text-white font-bold py-3 rounded-lg shadow transition-colors flex justify-center items-center';
            }

            document.getElementById('prompt-modal').classList.remove('hidden');

        // --- 5. 複製功能 ---
        
        // 複製單一整段 (舊功能)
        function copyPrompt() {
            executeCopy(currentPromptText, () => {
                const copyBtn = document.getElementById('copy-btn');
                copyBtn.innerHTML = `

        }

        // 複製特定多段落 (新功能)
        function copySpecificPrompt(id, index, btnElement) {
            const data = promptsData.find(item => item.id === id);
            const textToCopy = data.sub_prompts[index].content;
            
            executeCopy(textToCopy, () => {
                btnElement.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    已複製！請前往 AI 工具貼上`;
                btnElement.className = 'w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-lg shadow transition-colors flex justify-center items-center';
                
                // 2 秒後還原按鈕樣式
                setTimeout(() => {
                    btnElement.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        複製提示詞`;
                    btnElement.className = 'w-full bg-[#5cb85c] hover:bg-green-600 text-white font-bold py-3 rounded-lg shadow transition-colors flex justify-center items-center';
                }, 2000);
            });
        }

        // 共用的底層複製邏輯
        function executeCopy(text, onSuccess) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                onSuccess();
            } catch (err) {
                alert('複製失敗，請手動框選複製。');
            }
            
            document.body.removeChild(textArea);
        }

        // 點擊背景關閉 Modal
        document.getElementById('prompt-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        renderCards();
