<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Google Sans', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafd;
            color: #1f1f1f;
        }

        /* 隱藏預設滾動條，自訂輕量化滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }

        /* 打字機游標 */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: #1a73e8;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Canvas 滑入動畫 */
        .canvas-slide-in {
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: -4px 0 24px rgba(0,0,0,0.08);
        }
        .canvas-slide-in.active {
            transform: translateX(0);
        }

        /* 紅框標記動畫 */
        @keyframes highlight-pulse {
            0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(234, 67, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); }
        }
        .red-highlight {
            position: fixed;
            border: 3px solid #ea4335;
            border-radius: 12px;
            pointer-events: none;
            z-index: 1000;
            animation: highlight-pulse 1.5s infinite;
            transition: all 0.2s ease-out;
        }
        .red-highlight.rounded-pill { border-radius: 36px; }

        .red-arrow {
            position: fixed;
            z-index: 1001;
            transition: all 0.3s ease-out;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2));
            color: #ea4335;
        }

        /* 模擬區的字幕列 */
        #subtitle-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(32, 33, 36, 0.95);
            color: #fff;
            padding: 16px 32px;
            border-radius: 100px;
            font-size: 1.125rem;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.4s, top 0.4s, bottom 0.4s;
            max-width: 90%;
            letter-spacing: 0.5px;
        }

        .mock-code { font-family: 'Consolas', 'Courier New', monospace; color: #e8eaed; white-space: pre-wrap; font-size: 14px; line-height: 1.6;}
        .text-keyword { color: #8ab4f8; } 
        .text-tag { color: #f28b82; }     
        .text-string { color: #81c995; }  

        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(4px); }
        }
        .animate-bounce-x { animation: bounce-x 1s infinite; }
        
        @keyframes gemini-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .animate-gemini-think { animation: gemini-spin 2s ease-in-out infinite; }
        
        button { outline: none; }
        
        /* 漸層文字輔助 */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

        let currentExpIndex = 0;

        function renderExpStep() {
            // 渲染左側 Stepper

                const isClickable = index <= currentExpIndex || isQuizPassed;

                if (isClickable) {

            contentArea.innerHTML = `

            feedbackEl.classList.remove('hidden');

            if (selectedIndex === correctAnswer) {
                // 答對了
                isQuizPassed = true;
                labels[selectedIndex].classList.add('bg-green-50', 'border-green-400');
                feedbackEl.innerHTML = `<svg class="w-5 h-5 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 答對了！你可以前往下一步了。`;
                feedbackEl.className = "mt-4 p-3 rounded-lg font-medium text-sm bg-green-100 text-green-700 border border-green-200";
                
                // 解除下一步按鈕封印
                nextBtn.disabled = false;
                nextBtn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'text-white', 'animate-pulse');

                setTimeout(() => nextBtn.classList.remove('animate-pulse'), 1000);

            } else {

                isQuizPassed = false;
                labels[selectedIndex].classList.add('bg-red-50', 'border-red-300');
                feedbackEl.innerHTML = `<svg class="w-5 h-5 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 答錯了，請再看一次上面的解說喔！`;
                feedbackEl.className = "mt-4 p-3 rounded-lg font-medium text-sm bg-red-100 text-red-700 border border-red-200";
                
                // 鎖死下一步按鈕
                nextBtn.disabled = true;
                nextBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'text-white');
                nextBtn.classList.add('bg-slate-200', 'text-slate-400');
            }
        }

        function checkQuizAndNext() {
            if (isQuizPassed) {
                if (currentExpIndex < expData.length - 1) {
                    changeExpStep(1);
                } else {
                    // 完成最後一關，顯示過關畫面
                    const contentArea = document.getElementById('exp-content-area');
                    contentArea.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-center py-20 animate-pulse-once">
                            <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6 shadow-sm">
                                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h2 class="text-3xl font-bold text-slate-800 mb-4">恭喜完全通關！</h2>
                            <p class="text-lg text-slate-600 mb-8 leading-relaxed">您已經掌握了撰寫完美 Gemini 遊戲提示詞的秘訣。<br>現在，您可以回到模擬區親自體驗，或開始實作自己的教案了！</p>
                            <button onclick="switchTab('sim')" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-bold shadow-md transition-all">
                                回到互動生成模擬
                            </button>
                        </div>
                    `;
                    // 隱藏底部導覽按鈕
                    document.getElementById('exp-next-btn').style.display = 'none';
                    document.getElementById('exp-prev-btn').style.display = 'none';
                    document.getElementById('exp-progress').style.display = 'none';
                }
            }
        }

        function changeExpStep(direction) {
            currentExpIndex += direction;
            renderExpStep();
        }

        // 初始化解說頁面
        renderExpStep();


        // ==========================================
        // 分頁 1：Gemini 實機模擬腳本 (完整保留原版)
        // ==========================================
        const fullPrompt = `議題二：中部 - 彰濱「離岸風電」議題
[角色與目標]
你是一位精通 HTML5 與 Three.js 遊戲開發的前端專家。請幫我開發一款名為「白海豚的生存迷宮」的 3D 網頁遊戲。遊戲的主題是：在彰化外海，台灣白海豚必須穿越充滿打樁噪音與漁網的離岸風電施工海域，尋找安靜的覓食地。

[技術與環境規範]
單一檔案結構：將 HTML、CSS、JavaScript 全部寫在同一個檔案內，確保我能直接在瀏覽器點擊執行...`;

        const mockHtmlCode = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>白海豚的生存迷宮</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001122; }
        #game-ui { position: absolute; color: white; padding: 20px; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    <\/script>
</head>
<body>
    <div id="game-ui">生命值 / 飢餓度</div>
    <script type="module">
        import * as THREE from 'three';
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x001e36, 0.015);
        
        const capsuleGeo = new THREE.CapsuleGeometry(0.8, 2, 4, 16);
        const dolphin = new THREE.Mesh(capsuleGeo, new THREE.MeshLambertMaterial());
        scene.add(dolphin);
        // ... (省略部分碰撞與邏輯以加速顯示)
    <\/script>
</body>
</html>`;

        const startOverlay = document.getElementById('start-overlay');
        const welcomeTitle = document.getElementById('welcome-title');
        
        const menuPlus = document.getElementById('menu-plus');
        const menuModel = document.getElementById('menu-model');
        const targetCanvasItem = document.getElementById('target-canvas-item');
        const targetProItem = document.getElementById('target-pro-item');
        const btnPlus = document.getElementById('btn-plus');
        const btnModel = document.getElementById('btn-model');
        const canvasBadge = document.getElementById('canvas-badge'); 

        const typingArea = document.getElementById('typing-area');
        const cursor = document.getElementById('cursor');
        const sendBtn = document.getElementById('send-btn');
        const inputWrapper = document.getElementById('input-wrapper');
        const scrollContainer = document.getElementById('scroll-container');
        const userMsg = document.getElementById('user-msg');
        const botMsg = document.getElementById('bot-msg');
        const botStatus = document.getElementById('bot-status');
        const botIcon = document.getElementById('bot-icon');
        const canvasPanel = document.getElementById('canvas-panel');
        const mockCodeContent = document.getElementById('mock-code-content');
        const btnPreview = document.getElementById('btn-preview');
        const btnCode = document.getElementById('btn-code');
        const btnCopy = document.getElementById('btn-copy');
        const codeView = document.getElementById('code-view');
        const previewView = document.getElementById('preview-view');
        const chatArea = document.getElementById('chat-area');
        
        const highlightBox = document.getElementById('highlight-box');
        const highlightArrow = document.getElementById('highlight-arrow');
        const subtitleBar = document.getElementById('subtitle-bar');
        const nextStepBtn = document.getElementById('next-step-btn');

        let nextStepResolve = null;

        nextStepBtn.addEventListener('click', () => {
            if (nextStepResolve) {
                nextStepBtn.classList.add('hidden');
                const resolve = nextStepResolve;
                nextStepResolve = null;
                resolve();
            }
        });

        function waitForNext() {
            return new Promise(resolve => {
                nextStepBtn.classList.remove('hidden');
                nextStepResolve = resolve;
            });
        }

        let currentTargetEl = null;
        let currentDirection = 'down';

        async function typeText(element, text, speed = 30) {
            element.textContent = '';
            element.classList.remove('text-[#444746]'); 
            for (let i = 0; i < text.length; i++) {
                element.textContent += text.charAt(i);
                if (scrollContainer) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                if (currentTargetEl) updateHighlight(currentTargetEl, currentDirection);
                await new Promise(r => setTimeout(r, speed));
            }
        }

        function highlightElement(targetEl, direction = 'down', padding = 8) {
             if(!targetEl) return;
             currentTargetEl = targetEl;
             currentDirection = direction;
             
             if (targetEl.id === 'input-wrapper') {
                 highlightBox.classList.add('rounded-pill');
             } else {
                 highlightBox.classList.remove('rounded-pill');
             }
             updateHighlight(targetEl, direction, padding);
        }

        function updateHighlight(targetEl, direction, padding = 8) {
            if(!targetEl) return;
            const rect = targetEl.getBoundingClientRect();
            
            highlightBox.style.display = 'block';
            highlightBox.classList.remove('hidden');
            highlightBox.style.top = `${rect.top - padding}px`;
            highlightBox.style.left = `${rect.left - padding}px`;
            highlightBox.style.width = `${rect.width + padding*2}px`;
            highlightBox.style.height = `${rect.height + padding*2}px`;

            highlightArrow.style.display = 'block';
            highlightArrow.classList.remove('hidden');
            
            if (direction === 'up') {
                highlightArrow.style.top = `${rect.bottom + padding + 10}px`;
                highlightArrow.style.left = `${rect.left + rect.width/2 - 24}px`;
                highlightArrow.style.transform = 'rotate(0deg)';
            } else if (direction === 'down') {
                highlightArrow.style.top = `${rect.top - padding - 60}px`;
                highlightArrow.style.left = `${rect.left + rect.width/2 - 24}px`;
                highlightArrow.style.transform = 'rotate(180deg)';
            } else if (direction === 'left') {
                highlightArrow.style.top = `${rect.top + rect.height/2 - 24}px`;
                highlightArrow.style.left = `${rect.right + padding + 10}px`;
                highlightArrow.style.transform = 'rotate(270deg)';
            } else if (direction === 'right') {
                highlightArrow.style.top = `${rect.top + rect.height/2 - 24}px`;
                highlightArrow.style.left = `${rect.left - padding - 60}px`;
                highlightArrow.style.transform = 'rotate(90deg)';
            }

            const viewportHeight = window.innerHeight;
            if (rect.bottom > viewportHeight * 0.6) {
                // 因應上方有 Nav Bar，稍微調降避開高度
                subtitleBar.style.bottom = 'auto';
                subtitleBar.style.top = '100px'; 
            } else {
                subtitleBar.style.top = 'auto';
                subtitleBar.style.bottom = '24px';
            }
        }

        function hideHighlight() {
            currentTargetEl = null;
            highlightBox.classList.add('hidden');
            highlightArrow.classList.add('hidden');
            
            subtitleBar.style.top = 'auto';
            subtitleBar.style.bottom = '24px';
        }

        function setSubtitle(text) {
            subtitleBar.innerHTML = text;
            subtitleBar.style.opacity = 1;
        }

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function runSimulation() {
            startOverlay.style.opacity = 0;
            await wait(500);
            startOverlay.style.display = 'none';

            // 步驟一
            setSubtitle("步驟一：點擊左下角「+」號，選擇「Canvas」工具，開啟專屬的程式碼編輯畫布。");
            highlightElement(btnPlus, 'up', 6);
            await waitForNext();
            
            hideHighlight();
            menuPlus.classList.remove('hidden');
            highlightElement(targetCanvasItem, 'left', 6);
            await waitForNext();

            menuPlus.classList.add('hidden');
            hideHighlight();

            canvasBadge.classList.replace('hidden', 'flex');
            typingArea.textContent = '來和我寫作或開發吧！';
            await wait(300);

            // 步驟二
            setSubtitle("步驟二：點擊右下角模型選單，確認切換至「Pro」與「思考型」以處理複雜的程式碼。");
            highlightElement(btnModel, 'up', 6);
            await waitForNext();

            hideHighlight();
            menuModel.classList.remove('hidden');
            highlightElement(targetProItem, 'left', 6);
            await waitForNext();

            menuModel.classList.add('hidden');
            hideHighlight();

            // 步驟三
            setSubtitle("步驟三：設定完成！點擊「下一步」，我們將在輸入框中貼上【白海豚生存迷宮】提示詞。");
            highlightElement(inputWrapper, 'down');
            cursor.classList.remove('hidden');
            await waitForNext();

            welcomeTitle.classList.add('opacity-0');
            await typeText(typingArea, fullPrompt, 15);
            await wait(500);

            // 步驟四
            setSubtitle("步驟四：點擊「下一步」，模擬點擊右下角的『發送』圖示。");
            sendBtn.classList.remove('text-[#444746]');
            sendBtn.classList.add('text-[#1f1f1f]', 'bg-[#e1e5ea]');
            highlightElement(sendBtn, 'left', 6);
            await waitForNext();

            hideHighlight();
            sendBtn.style.transform = 'scale(0.9)';
            await wait(150);
            sendBtn.style.transform = 'scale(1)';
            typingArea.textContent = '來和我寫作或開發吧！';
            typingArea.classList.add('text-[#444746]');
            cursor.classList.add('hidden');
            sendBtn.classList.add('text-[#444746]');
            sendBtn.classList.remove('text-[#1f1f1f]', 'bg-[#e1e5ea]');
            
            // 步驟五
            welcomeTitle.classList.add('hidden');
            userMsg.classList.remove('hidden');
            setTimeout(()=> userMsg.classList.remove('opacity-0'), 50);
            await wait(500);
            botMsg.classList.remove('hidden');
            setTimeout(()=> botMsg.classList.remove('opacity-0'), 50);
            
            setSubtitle("步驟五：點擊「下一步」，Gemini 會在右側開啟 Canvas 畫布，並開始撰寫程式。");
            await waitForNext();

            chatArea.classList.add('md:w-[50%]', 'ml-0');
            chatArea.classList.remove('mx-auto');
            canvasPanel.classList.add('active');
            
            const syntaxColoredCode = mockHtmlCode
                .replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/(&lt;[a-zA-Z0-9]+|&lt;\/[a-zA-Z0-9]+&gt;)/g, '<span class="text-tag">$1</span>')
                .replace(/([a-zA-Z\-]+)="([^"]*)"/g, '<span class="text-keyword">$1</span>="<span class="text-string">$2</span>"');
            
            botStatus.innerHTML = "";
            botIcon.classList.remove('animate-gemini-think');
            botIcon.querySelector('path').setAttribute('fill', '#1A73E8');

            await typeText(mockCodeContent, mockHtmlCode, 3);
            mockCodeContent.innerHTML = syntaxColoredCode;
            await wait(500);

            // 步驟六
            setSubtitle("步驟六：程式碼生成完畢！點擊「下一步」模擬點擊上方『預覽』按鈕。");
            highlightElement(btnPreview, 'down', 4);
            await waitForNext();

            hideHighlight();
            btnPreview.classList.add('bg-white', 'text-[#1967d2]', 'shadow-sm');
            btnPreview.classList.remove('text-[#5f6368]', 'hover:text-[#1f1f1f]');
            btnCode.classList.remove('bg-white', 'text-[#1967d2]', 'shadow-sm');
            btnCode.classList.add('text-[#5f6368]', 'hover:text-[#1f1f1f]', 'bg-transparent');
            codeView.classList.add('hidden');
            previewView.classList.remove('hidden');
            previewView.classList.add('flex');
            
            // 步驟七
            setSubtitle("步驟七：進入預覽畫面，在此可以直接體驗遊戲。點擊「下一步」繼續。");
            await waitForNext();

            // 步驟八
            setSubtitle("步驟八：滿意後，點擊「下一步」模擬點擊『複製內容』圖示。");
            highlightElement(btnCopy, 'down', 4);
            await waitForNext();

            hideHighlight();
            btnCopy.style.transform = 'scale(0.8)';
            btnCopy.classList.add('bg-gray-200', 'text-gray-800');
            await wait(200);
            btnCopy.style.transform = 'scale(1)';
            
            // 步驟九
            setSubtitle("步驟九：將複製的程式碼存為 .html 檔案就大功告成了！點擊「下一步」完成。");
            await waitForNext();
            
            const successOverlay = document.createElement('div');
            successOverlay.className = "absolute inset-0 bg-white/95 z-50 flex flex-col items-center justify-center text-gray-800 backdrop-blur-md opacity-0 transition-opacity duration-1000";
            successOverlay.innerHTML = `
                <div class="mb-6">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" fill="#34A853" opacity="0.2"/>
                        <path d="M16 9L10.5 14.5L8 12" stroke="#34A853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 class="text-[32px] font-medium mb-3 text-[#1f1f1f]">模擬教學完成！</h2>
                <p class="text-[18px] text-[#5f6368] mb-10">您可以點擊上方導覽列，切換至「提示詞拆解解說」分頁了解 Prompt 原理。</p>
                <button onclick="location.reload()" class="px-8 py-3 bg-[#1a73e8] hover:bg-[#1557b0] text-white rounded-full font-medium text-[16px] transition-colors shadow-md">重新觀看教學</button>
            `;
            document.getElementById('view-sim').appendChild(successOverlay);
            
            await wait(100);
            successOverlay.style.opacity = 1;
        }

        if (startOverlay) {
            startOverlay.addEventListener('click', runSimulation);
        }
    </script>
</body>
</html>
